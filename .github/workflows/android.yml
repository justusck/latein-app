name: Android APK

# Baut eine installierbare, mit einem FESTEN Schlüssel signierte Android-APK.
# Dadurch lassen sich neue Versionen über die alte installieren, ohne Daten zu
# verlieren (gleiche Signatur). versionCode zählt automatisch hoch, damit
# Obtainium/Android das Update erkennt.
#
# Signatur-Secrets (im Repo unter Settings → Secrets → Actions):
#   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
#   ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
#
# Neue Version veröffentlichen:  git tag v1.0.1 && git push origin v1.0.1
# → erzeugt ein GitHub-Release mit der APK (von Obtainium auto-erkannt).

on:
  push:
    tags: ['v*'] # nur Versions-Tags bauen (ein Build pro Release)
  workflow_dispatch: # manueller Start über Actions → Run workflow

permissions:
  contents: write # für das Anhängen der APK an ein Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo prebuild (android)
        run: npx expo prebuild --platform android --no-install

      - name: Set app version
        working-directory: android/app
        run: |
          VC=${{ github.run_number }}
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then VN="${GITHUB_REF_NAME#v}"; else VN="0.0.${{ github.run_number }}"; fi
          sed -i "s/versionCode [0-9]\+/versionCode ${VC}/" build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${VN}\"/" build.gradle
          echo "versionCode=${VC}  versionName=${VN}"

      - name: Decode signing keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$GITHUB_WORKSPACE/android/app/release.keystore"

      - name: Enable ABI splits (kleinere APKs pro Architektur)
        working-directory: android/app
        run: |
          # Fügt splits { abi { ... } } in den android { } Block des build.gradle ein.
          # Dadurch entstehen separate APKs pro CPU-Architektur statt eines fetten Universal-APKs.
          sed -i '/^android {/a\
            \    splits {\
            \        abi {\
            \            reset()\
            \            enable true\
            \            universalApk false\
            \            include "arm64-v8a", "armeabi-v7a", "x86_64"\
            \        }\
            \    }' build.gradle

      - name: Build signed release APKs
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/app/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Prepare APKs
        id: apk
        run: |
          mkdir -p apks
          find android/app/build/outputs/apk/release -name '*.apk' | while read f; do
            arch=$(echo "$f" | grep -oP '(arm64-v8a|armeabi-v7a|x86_64)')
            dst="latina-${GITHUB_REF_NAME}-${arch}.apk"
            cp "$f" "apks/$dst"
          done
          ls -lh apks/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: latina-android-apks
          path: apks/*.apk
          if-no-files-found: error

      - name: Attach APKs to GitHub Release (on tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: apks/*.apk
          generate_release_notes: true
