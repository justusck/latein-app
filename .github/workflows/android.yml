name: Android APK

# Baut eine installierbare Android-APK (Release, signiert mit einem im Lauf
# erzeugten Keystore — keine Secrets nötig). Die APK liegt danach unter
# "Artifacts" des Workflow-Laufs zum Download. Bei einem Tag v* wird zusätzlich
# ein GitHub-Release mit der APK erstellt.

on:
  push:
    branches: ['**']
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo prebuild (android)
        run: npx expo prebuild --platform android --no-install

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$GITHUB_WORKSPACE/android/app/release.keystore" \
            -alias latina -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass latina-build -keypass latina-build \
            -dname "CN=Latina, OU=App, O=Latina, L=NA, ST=NA, C=DE"

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/app/release.keystore" \
            -Pandroid.injected.signing.store.password=latina-build \
            -Pandroid.injected.signing.key.alias=latina \
            -Pandroid.injected.signing.key.password=latina-build

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: latina-android-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
